AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Anomaly Detector v2 - Multi-Source Parallel Processing

Globals:
  Function:
    Runtime: python3.11
    Timeout: 120
    MemorySize: 128

Resources:

  # Handles cities 1-10 — Open-Meteo current conditions
  AnomalyDetectorWorkerForecast:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorWorkerForecast
      CodeUri: worker_forecast/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Anomaly_Detector_Results

  # Handles cities 11-20 — Open-Meteo 5-year historical average
  AnomalyDetectorWorkerArchive:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorWorkerArchive
      CodeUri: worker_archive/
      Handler: app.lambda_handler
      Timeout: 300
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Anomaly_Detector_Results

  # Handles cities 21-30 — NWS observations and alerts
  AnomalyDetectorWorkerNWS:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorWorkerNWS
      CodeUri: worker_nws/
      Handler: app.lambda_handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Anomaly_Detector_Results

  # 8:00 AM Eastern — fires all 3 workers simultaneously
  AnomalyDetectorCoordinator:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorCoordinator
      CodeUri: coordinator/
      Handler: app.lambda_handler
      Timeout: 60
      Policies:
        - DynamoDBCrudPolicy:
            TableName: AD_Time_Results
        - S3CrudPolicy:
            BucketName: anomaly-detector-dashboard
        - LambdaInvokePolicy:
            FunctionName: AnomalyDetectorWorkerForecast
        - LambdaInvokePolicy:
            FunctionName: AnomalyDetectorWorkerArchive
        - LambdaInvokePolicy:
            FunctionName: AnomalyDetectorWorkerNWS
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 12 * * ? *)
            Description: 8:00 AM Eastern — parallel run
            Enabled: true

  # 8:15 AM Eastern — fires workers one at a time
  # Starts 15 minutes after coordinator so parallel workers are done
  AnomalyDetectorSequentialRunner:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorSequentialRunner
      CodeUri: sequential_sys/
      Handler: app.lambda_handler
      Timeout: 600
      Policies:
        - DynamoDBCrudPolicy:
            TableName: AD_Time_Results
        - S3CrudPolicy:
            BucketName: anomaly-detector-dashboard
        - LambdaInvokePolicy:
            FunctionName: AnomalyDetectorWorkerForecast
        - LambdaInvokePolicy:
            FunctionName: AnomalyDetectorWorkerArchive
        - LambdaInvokePolicy:
            FunctionName: AnomalyDetectorWorkerNWS
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(15 12 * * ? *)
            Description: 8:15 AM Eastern — sequential benchmark run
            Enabled: true

  # 8:30 AM Eastern — aggregates parallel worker results into dashboard JSON
  AnomalyDetectorAggregator:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorAggregator
      CodeUri: aggregator/
      Handler: app.lambda_handler
      Timeout: 600
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Anomaly_Detector_Results
        - S3CrudPolicy:
            BucketName: anomaly-detector-dashboard
      Events:
        AggregateSchedule:
          Type: Schedule
          Properties:
            Schedule: cron(30 12 * * ? *)
            Description: 8:30 AM Eastern — aggregate results into dashboard JSON
            Enabled: true

  # 9:00 AM Eastern — single worker processes all 30 cities alone
  # Runs last to avoid competing with parallel workers for Lambda concurrency
  AnomalyDetectorWorkerSingle:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: AnomalyDetectorWorkerSingle
      CodeUri: worker_single/
      Handler: app.lambda_handler
      Timeout: 600
      Policies:
        - DynamoDBCrudPolicy:
            TableName: Anomaly_Detector_Results
        - DynamoDBCrudPolicy:
            TableName: AD_Time_Results
        - S3CrudPolicy:
            BucketName: anomaly-detector-dashboard
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 13 * * ? *)
            Description: 9:00 AM Eastern — single worker benchmark run
            Enabled: true